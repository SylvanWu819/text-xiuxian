<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#1e1e1e" stroke="#4ec9b0" stroke-width="3"/>
  
  <!-- Yin-Yang symbol representing cultivation -->
  <g transform="translate(64, 64)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="40" fill="none" stroke="#4ec9b0" stroke-width="2"/>
    
    <!-- Yin half -->
    <path d="M 0,-40 A 40,40 0 0,1 0,40 A 20,20 0 0,1 0,0 A 20,20 0 0,0 0,-40 Z" fill="#4ec9b0" opacity="0.3"/>
    
    <!-- Yang half -->
    <path d="M 0,-40 A 40,40 0 0,0 0,40 A 20,20 0 0,0 0,0 A 20,20 0 0,1 0,-40 Z" fill="#4ec9b0" opacity="0.7"/>
    
    <!-- Small circles -->
    <circle cx="0" cy="20" r="4" fill="#1e1e1e"/>
    <circle cx="0" cy="-20" r="4" fill="#4ec9b0"/>
    
    <!-- Sword symbol -->
    <g transform="translate(0, -5)">
      <line x1="0" y1="-15" x2="0" y2="15" stroke="#d4d4d4" stroke-width="2"/>
      <line x1="-5" y1="-15" x2="5" y2="-15" stroke="#d4d4d4" stroke-width="2"/>
      <circle cx="0" cy="-18" r="2" fill="#d4d4d4"/>
    </g>
  </g>
  
  <!-- Chinese character for "修" (cultivation) -->
  <text x="64" y="110" font-family="SimHei, Microsoft YaHei" font-size="20" fill="#4ec9b0" text-anchor="middle">修</text>
</svg>
